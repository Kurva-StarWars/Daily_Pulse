<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Pulse | Vercel Buster</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0a0c10; 
            --card: #12151c; 
            --accent: #58a6ff;
            --success: #3fb950;
            --error: #f85149;
            --text: #c9d1d9; 
            --border: #30363d;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            overflow-x: hidden;
        }

        /* --- Vercel Optimized Header --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(10, 12, 16, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding-top: env(safe-area-inset-top);
        }

        .header-top { padding: 15px; text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
        .brand span { color: var(--accent); }

        .shield-badge {
            font-size: 9px; font-weight: 900; color: var(--success);
            background: rgba(63, 185, 80, 0.1); padding: 3px 12px;
            border-radius: 50px; display: inline-block; margin-top: 5px;
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        /* --- Search & Tabs --- */
        .search-area { padding: 10px 15px; }
        .input-wrap {
            display: flex; background: #010409; border: 1px solid var(--border);
            border-radius: 14px; padding: 12px 18px; align-items: center; gap: 12px;
        }
        .input-wrap input { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; }

        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 5px 15px 15px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tabs button {
            background: #1c2128; color: #8b949e; border: 1px solid var(--border);
            padding: 10px 22px; border-radius: 12px; font-weight: 700; font-size: 11px;
            white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .tabs button.active { background: #fff; color: #000; border-color: #fff; }

        /* --- Content Area --- */
        main { max-width: 600px; margin: 0 auto; padding: 20px 15px 100px; }
        .feed { display: flex; flex-direction: column; gap: 15px; }

        .post {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 22px; position: relative; animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .post-meta { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; }
        .post-title { font-size: 1.15rem; font-weight: 800; color: #fff; line-height: 1.4; margin-bottom: 20px; }
        
        .post-btn {
            background: #21262d; color: #fff; border: 1px solid var(--border);
            padding: 14px; border-radius: 12px; width: 100%; font-weight: 800;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px;
        }
        .post-btn:active { transform: scale(0.98); background: #30363d; }

        /* --- Loaders & Errors --- */
        .loader { text-align: center; padding: 80px 20px; }
        .spin {
            width: 40px; height: 40px; border: 4px solid rgba(88, 166, 255, 0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: rotate 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }

        .error-card { 
            background: rgba(248, 81, 73, 0.05); border: 1px dashed var(--error); 
            padding: 35px 20px; border-radius: 24px; text-align: center;
        }
        .retry-btn { 
            background: var(--accent); color: #fff; border: none; padding: 12px 35px; 
            border-radius: 12px; font-weight: 800; margin-top: 20px; cursor: pointer;
        }

        /* --- Full View Modal --- */
        #modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: none; flex-direction: column;
        }
        .modal-header {
            padding: 15px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding-top: env(safe-area-inset-top);
        }
        .modal-body { flex: 1; overflow-y: auto; padding: 30px 25px; line-height: 1.8; color: #d1d9e0; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <h1 class="brand">DAILY <span>PULSE</span></h1>
        <div class="shield-badge"><i class="fa-solid fa-shield-halved"></i> VERCEL BYPASS ACTIVE</div>
    </div>
    
    <div class="search-area">
        <form onsubmit="doSearch(event)">
            <div class="input-wrap">
                <i class="fa-solid fa-satellite-dish" style="color:var(--accent)"></i>
                <input type="text" id="qInput" placeholder="Сканировать частоты...">
            </div>
        </form>
    </div>

    <nav class="tabs">
        <button id="t-hot" class="active" onclick="runPulse('последние мировые новости', this)">🔥 ГОРЯЧЕЕ</button>
        <button onclick="runPulse('технологии и гаджеты сегодня', this)">⚡️ ТЕХНО</button>
        <button onclick="runPulse('игры и киберспорт новости', this)">🎮 ИГРЫ</button>
        <button onclick="runPulse('наука и космос новости за день', this)">🧬 НАУКА</button>
        <button onclick="runPulse('кино и музыка новинки', this)">🍿 МЕДИА</button>
    </nav>
</header>

<main>
    <div id="main-feed" class="feed"></div>
</main>

<div id="modal">
    <div class="modal-header">
        <span style="font-weight: 900; font-size: 11px; color: var(--accent); letter-spacing: 2px;">DEEP SCAN DECODING</span>
        <i class="fa-solid fa-xmark" onclick="closeModal()" style="font-size: 32px; cursor: pointer;"></i>
    </div>
    <div id="modal-body" class="modal-body"></div>
</div>

<script>
    const API_KEY = ""; // Будет подставлено окружением
    let lastTopic = 'последние мировые новости';

    // Вспомогательная функция для сверхнадежных запросов
    async function safetyRequest(prompt, useSearch = true) {
        const target = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`;
        
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            // Минимизируем системную инструкцию для Vercel
            systemInstruction: { parts: [{ text: "Ты эксперт-агрегатор. Коротко и по фактам. Используй поиск." }] },
            generationConfig: { temperature: 0.5, maxOutputTokens: 800 }
        };

        if (useSearch) payload.tools = [{ "google_search": {} }];

        for (let i = 0; i < 4; i++) {
            try {
                const res = await fetch(target, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Vercel/API Throttle");
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                if (i === 3) throw e;
                await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
            }
        }
    }

    async function runPulse(topic, btn) {
        lastTopic = topic;
        const feed = document.getElementById('main-feed');
        if (btn) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        feed.innerHTML = `
            <div class="loader">
                <div class="spin"></div>
                <p style="font-weight: 900; letter-spacing: 1px;">ОБХОД БЛОКИРОВОК... 📡</p>
                <p style="font-size: 11px; color: #8b949e; margin-top: 8px;">Vercel Shield в действии</p>
            </div>`;

        // Ультра-короткий формат для стабильности прокси
        const prompt = `Новости: "${topic}". Выдай 5 шт. Формат:
        T: [Заголовок]
        C: [Категория]
        D: [Дата]
        ---`;

        try {
            const raw = await safetyRequest(prompt);
            const items = raw.split('---').filter(x => x.includes('T:'));

            if (items.length === 0) throw new Error("Empty Payload");

            feed.innerHTML = '';
            items.forEach(block => {
                const title = block.match(/T: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "Новость";
                const cat = block.match(/C: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "LIVE";
                const date = block.match(/D: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "Сегодня";

                const el = document.createElement('div');
                el.className = 'post';
                el.innerHTML = `
                    <div class="post-meta">
                        <span>${cat}</span>
                        <span style="color: #8b949e">${date}</span>
                    </div>
                    <div class="post-title">${title}</div>
                    <button class="post-btn" onclick="showFull('${title.replace(/'/g, "\\'")}')">
                        <i class="fa-solid fa-bolt"></i> ЧИТАТЬ ПОЛНОСТЬЮ
                    </button>
                `;
                feed.appendChild(el);
            });
        } catch (e) {
            feed.innerHTML = `
                <div class="error-card">
                    <i class="fa-solid fa-shield-virus" style="font-size: 45px; color: var(--error); margin-bottom: 20px;"></i>
                    <h3 style="color: #fff;">Vercel заблокировал поток</h3>
                    <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">Серверные функции хостинга не пропускают тяжелые запросы. Мы пробуем обходной путь.</p>
                    <button class="retry-btn" onclick="runPulse(lastTopic)">ПЕРЕПОДКЛЮЧИТЬСЯ</button>
                </div>`;
        }
    }

    async function showFull(title) {
        const m = document.getElementById('modal');
        const b = document.getElementById('modal-body');
        m.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        b.innerHTML = '<div class="loader"><div class="spin"></div><p>Декодирую архив... 🧬</p></div>';

        try {
            const content = await safetyRequest(`Напиши подробную статью про: "${title}". Факты из поиска, структура, эмодзи.`);
            b.innerHTML = `<h2>${title}</h2>` + content.split('\n').map(p => p.trim() ? `<p>${p.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</p>` : '').join('');
        } catch (e) {
            b.innerHTML = '<div class="error-card"><p>Не удалось пробить защиту для полной версии.</p></div>';
        }
    }

    function doSearch(e) {
        e.preventDefault();
        const v = document.getElementById('qInput').value.trim();
        if (v) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            runPulse(v);
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = () => runPulse('последние мировые новости');
</script>

</body>
</html>
