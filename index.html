<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Pulse | Ghost Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg: #010204; 
            --card: #0d1117; 
            --ghost: #8b5cf6;
            --fox: #ff7b72;
            --accent: #58a6ff;
            --text: #e6edf3; 
            --border: #30363d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: linear-gradient(to bottom, #0d1117, #010204);
        }
        
        header { 
            background: rgba(1, 2, 4, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
            padding-top: env(safe-area-inset-top);
        }
        .top-bar { display: flex; flex-direction: column; align-items: center; padding: 12px 0; }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 5px; color: #fff; text-transform: uppercase; margin: 0; }
        .status-pill { font-size: 8px; background: rgba(88, 166, 255, 0.1); color: var(--accent); padding: 2px 10px; border-radius: 20px; margin-top: 5px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(88, 166, 255, 0.2); }

        .search-container { padding: 0 15px 15px; }
        .ghost-input { 
            display: flex; background: #161b22; border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px 15px; align-items: center; gap: 10px;
            transition: all 0.3s ease;
        }
        .ghost-input:focus-within { border-color: var(--ghost); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
        .ghost-input input { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; }

        .nav-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 15px 15px; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-scroll button { 
            background: #21262d; color: #8b949e; border: 1px solid var(--border); 
            padding: 8px 18px; border-radius: 10px; font-weight: 800; font-size: 11px; 
            white-space: nowrap; transition: 0.2s; cursor: pointer; text-transform: uppercase;
        }
        .nav-scroll button.active { background: var(--ghost); color: #fff; border-color: var(--ghost); box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); }

        main { max-width: 600px; margin: 0 auto; padding: 10px 15px 100px; }
        #feed { display: flex; flex-direction: column; gap: 12px; }
        
        .news-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
            padding: 18px; animation: ghostFadeIn 0.5s ease-out; position: relative;
        }
        @keyframes ghostFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; font-size: 10px; font-weight: 900; color: var(--ghost); margin-bottom: 10px; text-transform: uppercase; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: #f0f6fc; line-height: 1.4; margin-bottom: 15px; }
        
        .read-more { 
            background: rgba(139, 92, 246, 0.1); color: var(--ghost); border: 1px solid rgba(139, 92, 246, 0.2); 
            padding: 12px; border-radius: 10px; width: 100%; font-weight: 800; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 12px; transition: 0.2s;
        }
        .read-more:active { transform: scale(0.98); background: rgba(139, 92, 246, 0.2); }

        /* GHOST LOADER */
        .loader-box { text-align: center; padding: 80px 20px; }
        .ghost-spinner { 
            width: 40px; height: 40px; border: 3px solid rgba(139, 92, 246, 0.1); 
            border-top: 3px solid var(--ghost); border-radius: 50%; 
            animation: spin 0.8s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODAL */
        #reader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .reader-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top); }
        .reader-body { flex: 1; overflow-y: auto; padding: 25px; line-height: 1.8; font-size: 1.1rem; }
        
        .error-msg { background: rgba(255, 123, 114, 0.05); border: 1px dashed var(--fox); padding: 30px; border-radius: 20px; text-align: center; }
        .btn-retry { background: var(--ghost); color: #fff; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; margin-top: 15px; cursor: pointer; }

        /* GHOST TOAST */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--ghost); color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: 800; font-size: 12px; display: none; z-index: 3000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <h1 class="logo">Daily Pulse</h1>
        <div class="status-pill">GHOST PROTOCOL ACTIVATED 👻</div>
    </div>
    
    <div class="search-container">
        <form onsubmit="handleSearch(event)">
            <div class="ghost-input">
                <i class="fa-solid fa-ghost" style="color:var(--ghost)"></i>
                <input type="text" id="searchInput" placeholder="Поиск сквозь фильтры...">
            </div>
        </form>
    </div>

    <nav class="nav-scroll">
        <button id="btn-main" class="active" onclick="pulseScan('главные новости мира за последний час', this)">ГЛАВНОЕ 🔥</button>
        <button onclick="pulseScan('новости технологий и гаджетов сегодня', this)">ТЕХНО ⚡️</button>
        <button onclick="pulseScan('свежие новости видеоигр', this)">ИГРЫ 🎮</button>
        <button onclick="pulseScan('новости науки и медицины', this)">НАУКА 🧬</button>
        <button onclick="pulseScan('новости криптовалют и финансов', this)">ФИНАНСЫ 💎</button>
    </nav>
</header>

<main>
    <div id="feed"></div>
</main>

<div id="reader">
    <div class="reader-header">
        <span style="font-weight: 900; font-size: 10px; color: var(--ghost); letter-spacing: 2px;">NEURAL RECONSTRUCTION</span>
        <i class="fa-solid fa-circle-xmark" onclick="closeReader()" style="font-size: 30px; cursor: pointer; color: var(--fox);"></i>
    </div>
    <div id="readerBody" class="reader-body"></div>
</div>

<div id="toast"></div>

<script>
    const apiKey = "";
    let currentTopic = 'главные новости мира за последний час';

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function requestGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const config = {
            contents: [{ parts: [{ text: prompt }] }],
            tools: [{ "google_search": {} }],
            generationConfig: { temperature: 0.7 }
        };

        // Retry Logic with Ghost protocol
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                if (!response.ok) {
                    if (response.status === 429) throw new Error("Rate Limit");
                    throw new Error("API Offline");
                }
                
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) {
                if (i === 4) throw err;
                console.log(`Ghost Retry ${i+1}...`);
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }
    }

    async function pulseScan(topic, btn) {
        currentTopic = topic;
        const feed = document.getElementById('feed');
        if (btn) {
            document.querySelectorAll('.nav-scroll button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        feed.innerHTML = `
            <div class="loader-box">
                <div class="ghost-spinner"></div>
                <p style="font-weight: 900; color: #fff; font-size: 14px;">ПРОТОКОЛ ПРИЗРАКА... 👻</p>
                <p style="font-size: 11px; opacity: 0.5; margin-top: 5px;">Обходим CORS и лимиты</p>
            </div>`;

        const prompt = `Действуй как новостной агрегатор. Найди 5 актуальных новостей: "${topic}". 
        Выведи строго в формате:
        H: [Заголовок]
        T: [Тег]
        D: [Время]
        --- (разделитель)`;

        try {
            const raw = await requestGemini(prompt);
            const blocks = raw.split('---').filter(b => b.includes('H:'));
            
            if (blocks.length === 0) throw new Error("Data empty");

            feed.innerHTML = '';
            blocks.forEach(block => {
                const h = block.match(/H: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "Новость";
                const t = block.match(/T: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "LIVE";
                const d = block.match(/D: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "Сегодня";

                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span>${t}</span>
                        <span style="color:#8b949e">${d}</span>
                    </div>
                    <div class="card-title">${h}</div>
                    <button class="read-more" onclick="readDeep('${h.replace(/'/g, "\\'")}')">
                        <i class="fa-solid fa-microchip"></i> ПОДРОБНЕЕ
                    </button>
                `;
                feed.appendChild(card);
            });
            localStorage.setItem('ghost_cache', feed.innerHTML); // Сохраняем в кэш
        } catch (e) {
            const cache = localStorage.getItem('ghost_cache');
            if (cache) {
                feed.innerHTML = cache;
                showToast("Используем Ghost-кэш (офлайн)");
            } else {
                feed.innerHTML = `
                    <div class="error-msg">
                        <i class="fa-solid fa-wifi-slash" style="font-size:40px; color:var(--fox); margin-bottom:15px"></i>
                        <h3 style="color:#fff">Обрыв нейро-связи</h3>
                        <p style="font-size:12px; opacity:0.7">API отклонило запрос. Попробуй нажать кнопку ниже или смени VPN.</p>
                        <button class="btn-retry" onclick="pulseScan(currentTopic)">ПОВТОРИТЬ СКАН</button>
                    </div>`;
            }
        }
    }

    async function readDeep(title) {
        const r = document.getElementById('reader');
        const b = document.getElementById('readerBody');
        r.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        b.innerHTML = '<div class="loader-box"><div class="ghost-spinner"></div><p>Восстанавливаю детали... ✨</p></div>';

        try {
            const info = await requestGemini(`Напиши подробный обзор новости: "${title}". Используй свежие данные из поиска, добавь аналитику и эмодзи. Разбей на абзацы.`);
            b.innerHTML = `<h2 style="color:#fff; font-size:1.5rem; margin-bottom:20px;">${title}</h2>` + 
                          info.split('\n').map(p => p.trim() ? `<p style="margin-bottom:15px">${p.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</p>` : '').join('');
        } catch (e) {
            b.innerHTML = '<p style="text-align:center; padding:40px">Не удалось загрузить данные. Попробуйте позже.</p>';
        }
    }

    function handleSearch(e) {
        e.preventDefault();
        const v = document.getElementById('searchInput').value.trim();
        if (v) {
            document.querySelectorAll('.nav-scroll button').forEach(b => b.classList.remove('active'));
            pulseScan(v);
        }
    }

    function closeReader() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = () => pulseScan('главные новости мира за последний час');
</script>

</body>
</html>
