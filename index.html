<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Pulse</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/pulse.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/32/pulse.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #58a6ff; 
            --text: #c9d1d9; 
            --header: #010409; 
            --success: #238636; 
            --time: #8b949e; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
        }
        
        header { 
            background: var(--header); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid #30363d; 
            padding-top: env(safe-area-inset-top); 
        }
        .logo-box { display: flex; flex-direction: column; align-items: center; padding: 15px 0 5px; }
        .logo-txt { font-size: 1.1rem; font-weight: 900; letter-spacing: 5px; color: #fff; line-height: 1; }
        .pulse-svg { width: 90px; height: 25px; margin: 5px 0; }
        .pulse-path { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 120; animation: pAnim 2.5s linear infinite; }
        @keyframes pAnim { from { stroke-dashoffset: 240; } to { stroke-dashoffset: 0; } }

        .search-container { padding: 0 15px 15px; background: var(--header); }
        .search-box { 
            display: flex; 
            background: #21262d; 
            border: 1px solid #30363d; 
            border-radius: 15px; 
            padding: 8px 15px; 
            align-items: center; 
            gap: 10px;
        }
        .search-box input { 
            background: transparent; 
            border: none; 
            color: #fff; 
            flex: 1; 
            font-size: 15px; 
            padding: 5px 0;
        }
        .search-box i { color: var(--time); }

        nav { display: flex; gap: 10px; overflow-x: auto; padding: 12px 15px; background: var(--header); scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav button { 
            background: #21262d; 
            color: #fff; 
            border: 1px solid #30363d; 
            padding: 10px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            white-space: nowrap; 
            font-weight: 800; 
            font-size: 12px; 
        }
        nav button.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }

        main { max-width: 600px; margin: 10px auto; padding: 0 15px 80px; }
        #feed { display: flex; flex-direction: column; gap: 16px; }
        
        .card { background: var(--card); border-radius: 22px; border: 1px solid #30363d; padding: 22px; animation: pop 0.3s ease-out; }
        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-top { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .card-tag { font-size: 0.65rem; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .card-time { font-size: 0.7rem; color: var(--time); font-weight: 600; text-align: right; line-height: 1.2; }
        .card-title { font-size: 1.15rem; font-weight: 800; color: #fff; line-height: 1.4; margin-bottom: 20px; }
        .card-btn { background: var(--success); color: #fff; border: none; padding: 15px; border-radius: 14px; font-weight: 900; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%; font-size: 13px; }

        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .r-header { padding: 15px 20px; background: var(--header); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-top: env(safe-area-inset-top); }
        .r-body { flex-grow: 1; overflow-y: auto; padding: 25px; line-height: 1.7; font-size: 1.1rem; color: #e2e8f0; }

        .loader { text-align: center; padding: 80px 20px; color: #8b949e; }
        .spin { width: 40px; height: 40px; border: 3px solid rgba(88,166,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: s 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <span class="logo-txt">DAILY</span>
        <svg class="pulse-svg" viewBox="0 0 100 25"><path class="pulse-path" d="M0 12.5 H35 L40 3 L50 22 L55 12.5 H100"/></svg>
        <span class="logo-txt" style="color:var(--accent)">PULSE</span>
    </div>
    
    <div class="search-container">
        <form onsubmit="handleSearch(event)">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Поиск (например: GTA 6, Илон Маск)...">
            </div>
        </form>
    </div>

    <nav id="nav">
        <button class="active" onclick="loadAI('последние важные мировые новости за этот час', this)">ГЛАВНОЕ 🔥</button>
        <button onclick="loadAI('свежие игровые новости, анонсы и релизы игр', this)">ИГРЫ 🎮</button>
        <button onclick="loadAI('новости AI, нейросетей и технологий сегодня', this)">ТЕХНО ⚡️</button>
        <button onclick="loadAI('новости науки и космоса', this)">НАУКА 🧬</button>
    </nav>
</header>

<main id="feed"></main>

<div id="reader">
    <div class="r-header">
        <span style="font-weight:900; color:var(--accent); font-size: 0.8rem;">PULSE NEURAL AI</span>
        <i class="fa-solid fa-circle-chevron-down" onclick="closeR()" style="font-size: 32px; cursor: pointer; color: var(--accent);"></i>
    </div>
    <div id="r-content" class="r-body"></div>
</div>

<script>
    const apiKey = "";

    async function queryAI(prompt, json = false) {
        const now = new Date().toLocaleString('ru-RU');
        const finalPrompt = `${prompt}\n\nТекущее время и дата: ${now}.`;
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const body = { contents: [{ parts: [{ text: finalPrompt }] }] };

        if (json) {
            body.generationConfig = {
                responseMimeType: "application/json",
                responseSchema: {
                    type: "OBJECT",
                    properties: {
                        news: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    title: { type: "STRING" },
                                    tag: { type: "STRING" },
                                    time: { type: "STRING", description: "Время (ЧЧ:ММ)" },
                                    date: { type: "STRING", description: "Дата (ДД.ММ)" }
                                }
                            }
                        }
                    }
                }
            };
        }

        const res = await fetch(url, { method: 'POST', body: JSON.stringify(body) });
        const d = await res.json();
        return d.candidates[0].content.parts[0].text;
    }

    async function loadAI(topic, btn) {
        const grid = document.getElementById('feed');
        if(btn) {
            document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('searchInput').value = ''; 
        }
        grid.innerHTML = '<div class="loader"><div class="spin"></div><p>Сканирую реальность... 📡</p></div>';

        try {
            const result = await queryAI(`Найди 5 актуальных новостей на тему: "${topic}". Сортируй: новые сверху.`, true);
            const data = JSON.parse(result).news;

            grid.innerHTML = '';
            data.forEach(n => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-tag">${n.tag || 'LIVE'}</div>
                        <div class="card-time">
                            <i class="fa-regular fa-calendar"></i> ${n.date || ''}<br>
                            <i class="fa-regular fa-clock"></i> ${n.time || ''}
                        </div>
                    </div>
                    <div class="card-title">${n.title}</div>
                    <button class="card-btn" onclick="openDeep('${n.title}')">
                        <i class="fa-solid fa-bolt"></i> АНАЛИЗ ИИ
                    </button>`;
                grid.appendChild(card);
            });
        } catch (e) {
            grid.innerHTML = '<div class="loader">⚠️ Сбой в матрице. Попробуй обновить.</div>';
        }
    }

    function handleSearch(e) {
        e.preventDefault();
        const val = document.getElementById('searchInput').value.trim();
        if(!val) return;
        document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
        loadAI(`новости по теме: ${val}`);
    }

    async function openDeep(title) {
        const r = document.getElementById('reader');
        const c = document.getElementById('r-content');
        r.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        c.innerHTML = '<div class="loader"><div class="spin"></div><p>ИИ восстанавливает детали... 🧠</p></div>';

        try {
            const text = await queryAI(`Напиши подробную статью на русском про "${title}". Используй параграфы и эмодзи.`);
            c.innerHTML = `<h1>${title}</h1><hr style="border:0; border-top:1px solid #30363d; margin:20px 0;">` + 
                          text.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
        } catch (e) {
            c.innerHTML = '<div class="loader">Ошибка расшифровки данных.</div>';
        }
    }

    function closeR() { document.getElementById('reader').style.display = 'none'; document.body.style.overflow = 'auto'; }
    window.onload = () => loadAI('главные мировые новости за этот час');
</script>

</body>
</html>
