<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Pulse</title>
    
    <!-- ИКОНКИ И PWA (ДЛЯ РАБОЧЕГО СТОЛА) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Pulse">
    
    <!-- Основная иконка для iOS -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/pulse.png">
    <link rel="apple-touch-icon" sizes="152x152" href="https://img.icons8.com/fluency/152/pulse.png">
    <link rel="apple-touch-icon" sizes="167x167" href="https://img.icons8.com/fluency/167/pulse.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/fluency/180/pulse.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/32/pulse.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff;
            --text: #c9d1d9; --header: #010409; --success: #238636;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 30px; }
        
        header { background: var(--header); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #30363d; padding-top: env(safe-area-inset-top); }
        .logo-section { display: flex; flex-direction: column; align-items: center; padding: 15px 0 10px; }
        .logo-text { font-size: 1.1rem; font-weight: 900; letter-spacing: 4px; color: #fff; line-height: 0.8; }
        .logo-text.blue { color: var(--accent); }
        
        .pulse-svg { width: 90px; height: 22px; margin: 6px 0; }
        .pulse-svg path { stroke-dasharray: 100; animation: dash 3s linear infinite; }
        @keyframes dash { from { stroke-dashoffset: 200; } to { stroke-dashoffset: 0; } }

        .nav-scroller { display: flex; gap: 10px; overflow-x: auto; padding: 12px; background: var(--header); scrollbar-width: none; }
        .nav-scroller::-webkit-scrollbar { display: none; }
        
        nav button { 
            background: #21262d; color: #fff; border: 1px solid #30363d; 
            padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 14px;
            transition: 0.2s;
        }
        nav button.active { background: var(--accent); color: #0d1117; border-color: var(--accent); box-shadow: 0 0 15px rgba(88, 166, 255, 0.3); }

        main { max-width: 1200px; margin: 10px auto; padding: 0 15px; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        
        .card { 
            background: var(--card); border-radius: 16px; border: 1px solid #30363d; 
            padding: 18px; display: flex; flex-direction: column; transition: 0.2s;
        }
        .card:active { transform: scale(0.97); }
        .card-date { font-size: 0.7rem; color: var(--accent); margin-bottom: 10px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: #fff; line-height: 1.4; margin-bottom: 20px; flex-grow: 1; }
        
        .btn-open { 
            background: var(--success); color: #fff; border: none; 
            padding: 14px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .r-nav { padding: 20px; background: var(--header); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        .r-body { flex-grow: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.15rem; }
        
        .loader-box { text-align: center; padding: 60px 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(88,166,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <span class="logo-text">DAILY</span>
        <svg class="pulse-svg" viewBox="0 0 100 20"><path d="M0 10 H30 L35 2 L45 18 L50 10 H100" fill="transparent" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/></svg>
        <span class="logo-text blue">PULSE</span>
    </div>
    <nav class="nav-scroller">
        <button class="active" onclick="loadFeed('top', this)">ГЛАВНОЕ 🔥</button>
        <button onclick="loadFeed('technology', this)">ТЕХНО ⚡️</button>
        <button onclick="loadFeed('games', this)">ИГРЫ 🎮</button>
        <button onclick="loadFeed('sports', this)">СПОРТ ⚽️</button>
        <button onclick="loadFeed('business', this)">БИЗНЕС 💎</button>
    </nav>
</header>

<main id="grid"></main>

<div id="reader">
    <div class="r-nav">
        <span style="color: var(--accent); font-weight: 900; letter-spacing: 1px;">PULSE AI READER</span>
        <i class="fa-solid fa-xmark" onclick="closeReader()" style="font-size: 24px; cursor: pointer;"></i>
    </div>
    <div id="r-body" class="r-body"></div>
</div>

<script>
    // ВСТАВЬ СВОЙ КЛЮЧ GEMINI НИЖЕ
    const geminiKey = "AIzaSyBy7JjtFqMqzts9tK47e6tiAAAhfhOdCDM"; 

    async function loadFeed(topic, btn) {
        const container = document.getElementById('grid');
        if(btn) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        container.innerHTML = '<div class="loader-box"><div class="spinner"></div><p>Ищем самое важное...</p></div>';

        // URL Google News
        let rss = `https://news.google.com/rss/headlines/section/topic/${topic.toUpperCase()}?hl=ru&gl=RU&ceid=RU:ru`;
        if (topic === 'top') rss = `https://news.google.com/rss?hl=ru&gl=RU&ceid=RU:ru`;

        // Прокси для обхода ограничений
        const proxy = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&api_key=oyv7wixp0jrvpmsvclz6bqqxof9qjuxonx0x6x7b&_=${Date.now()}`;

        try {
            const res = await fetch(proxy);
            const data = await res.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                container.innerHTML = '';
                data.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const time = new Date(item.pubDate).toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' });
                    const cleanTitle = item.title.split(' - ')[0];
                    
                    card.innerHTML = `
                        <div class="card-date"><i class="fa-regular fa-clock"></i> ${time}</div>
                        <div class="card-title">${cleanTitle}</div>
                        <button class="btn-open" onclick="openFull('${item.link}', '${cleanTitle.replace(/'/g,"")}')">ЧИТАТЬ <i class="fa-solid fa-chevron-right"></i></button>
                    `;
                    container.appendChild(card);
                });
            } else {
                throw new Error("Empty data");
            }
        } catch (e) {
            container.innerHTML = '<div class="loader-box"><p>😵 Ошибка загрузки «Главного».<br>Попробуй переключить категорию или обнови страницу.</p></div>';
        }
    }

    async function openFull(url, title) {
        const modal = document.getElementById('reader');
        const body = document.getElementById('r-body');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        body.innerHTML = '<div class="loader-box"><div class="spinner"></div><p>ИИ копирует текст из источника...</p></div>';

        try {
            const prompt = `Act as a copy-paster. Open this link: ${url}. News Title: ${title}. 
            COPY the original article text in Russian. No summaries. Use paragraphs. Add 2-3 emojis. 
            If text is blocked, describe what you see on the page.`;
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const result = await res.json();
            const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "Контент недоступен.";
            
            body.innerHTML = `<h2>${title}</h2><hr style="border:0; border-top:1px solid #30363d; margin:20px 0;">` + text.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
        } catch (e) {
            body.innerHTML = `<h3>Ошибка ИИ</h3><p>Не удалось выгрузить текст. Возможно, превышен лимит или ключ не верен.</p><br><a href="${url}" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:bold;">ОТКРЫТЬ В ИСТОЧНИКЕ</a>`;
        }
    }

    function closeReader() { 
        document.getElementById('reader').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }
    
    window.onload = () => loadFeed('top');
</script>

</body>
</html>
