<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Pulse | Next Gen</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #58a6ff; 
            --text: #c9d1d9; 
            --header: #010409; 
            --success: #238636; 
            --time: #8b949e; 
            --error: #f85149;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden;
            line-height: 1.5;
        }
        
        header { 
            background: var(--header); 
            position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid #30363d; 
            padding-top: env(safe-area-inset-top); 
        }
        .logo-box { display: flex; flex-direction: column; align-items: center; padding: 15px 0 5px; }
        .logo-txt { font-size: 1.1rem; font-weight: 900; letter-spacing: 5px; color: #fff; line-height: 1; text-transform: uppercase; }
        .pulse-svg { width: 90px; height: 25px; margin: 5px 0; }
        .pulse-path { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 120; animation: pAnim 2.5s linear infinite; }
        @keyframes pAnim { from { stroke-dashoffset: 240; } to { stroke-dashoffset: 0; } }

        .search-container { padding: 0 15px 15px; background: var(--header); }
        .search-box { 
            display: flex; background: #21262d; 
            border: 1px solid #30363d; border-radius: 12px; 
            padding: 10px 15px; align-items: center; gap: 12px;
            transition: border-color 0.3s;
        }
        .search-box:focus-within { border-color: var(--accent); }
        .search-box input { 
            background: transparent; border: none; color: #fff; 
            flex: 1; font-size: 16px; 
        }

        nav { display: flex; gap: 10px; overflow-x: auto; padding: 12px 15px; background: var(--header); scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav button { 
            background: #21262d; color: #fff; border: 1px solid #30363d; 
            padding: 10px 22px; border-radius: 20px; font-weight: 800; font-size: 12px; 
            transition: 0.2s; white-space: nowrap; cursor: pointer;
        }
        nav button:active { transform: scale(0.95); }
        nav button.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }

        main { max-width: 600px; margin: 10px auto; padding: 0 15px 80px; }
        #feed { display: flex; flex-direction: column; gap: 16px; }
        
        .card { 
            background: var(--card); border-radius: 20px; border: 1px solid #30363d; 
            padding: 22px; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.2s;
        }
        @keyframes pop { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card-top { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .card-tag { font-size: 0.65rem; font-weight: 900; color: var(--accent); text-transform: uppercase; background: rgba(88,166,255,0.1); padding: 4px 8px; border-radius: 6px; letter-spacing: 0.5px; }
        .card-time { font-size: 0.7rem; color: var(--time); font-weight: 600; line-height: 1.2; text-align: right; }
        .card-title { font-size: 1.2rem; font-weight: 800; color: #fff; line-height: 1.4; margin-bottom: 18px; }
        .card-btn { 
            background: var(--success); color: #fff; border: none; padding: 14px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; 
            font-size: 13px; display: flex; justify-content: center; align-items: center; 
            gap: 10px; transition: 0.2s;
        }
        .card-btn:active { background: #2ea043; transform: scale(0.98); }

        .loader { text-align: center; padding: 80px 20px; color: var(--time); }
        .spin { width: 40px; height: 40px; border: 3px solid rgba(88,166,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: s 0.8s linear infinite; margin: 0 auto 18px; }
        @keyframes s { to { transform: rotate(360deg); } }

        .error-card { background: rgba(248, 81, 73, 0.05); border: 1px dashed var(--error); padding: 35px; border-radius: 24px; text-align: center; }
        .retry-btn { margin-top: 20px; background: var(--accent); color: #000; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .retry-btn:active { opacity: 0.8; }

        #reader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .r-header { 
            padding: 15px 20px; background: var(--header); 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #30363d; padding-top: env(safe-area-inset-top); 
        }
        .r-body { flex-grow: 1; overflow-y: auto; padding: 30px 25px; line-height: 1.8; font-size: 1.1rem; color: #e2e8f0; }
        .r-body h2 { color: #fff; margin-bottom: 20px; line-height: 1.3; font-weight: 800; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <span class="logo-txt">DAILY</span>
        <svg class="pulse-svg" viewBox="0 0 100 25"><path class="pulse-path" d="M0 12.5 H35 L40 3 L50 22 L55 12.5 H100"/></svg>
        <span class="logo-txt" style="color:var(--accent)">PULSE</span>
    </div>
    
    <div class="search-container">
        <form onsubmit="handleSearch(event)">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass" style="color:var(--time)"></i>
                <input type="text" id="searchInput" placeholder="Поиск (GTA 6, AI, новости)...">
            </div>
        </form>
    </div>

    <nav id="nav">
        <button id="btn-main" class="active" onclick="loadAI('главные мировые новости за текущий час', this)">ГЛАВНОЕ 🔥</button>
        <button onclick="loadAI('новости игровой индустрии и киберспорта сегодня', this)">ИГРЫ 🎮</button>
        <button onclick="loadAI('новости технологий, гаджетов и AI', this)">ТЕХНО ⚡️</button>
        <button onclick="loadAI('новости науки, космоса и открытий', this)">НАУКА 🧬</button>
    </nav>
</header>

<main id="feed"></main>

<div id="reader">
    <div class="r-header">
        <span style="font-weight:900; color:var(--accent); font-size: 0.75rem; letter-spacing: 1px;">PULSE NEURAL AI</span>
        <i class="fa-solid fa-xmark" onclick="closeR()" style="font-size: 28px; color: var(--text); cursor: pointer;"></i>
    </div>
    <div id="r-content" class="r-body"></div>
</div>

<script>
    const apiKey = "";
    let currentTopic = 'главные мировые новости за текущий час';

    async function callGemini(prompt, useJson = false) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const timeRef = new Date().toLocaleString('ru-RU');
        
        const payload = {
            contents: [{ parts: [{ text: `${prompt}\n\n[Reference Date/Time: ${timeRef}]` }] }]
        };

        if (useJson) {
            payload.generationConfig = {
                responseMimeType: "application/json",
                responseSchema: {
                    type: "OBJECT",
                    properties: {
                        items: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    title: { type: "STRING" },
                                    tag: { type: "STRING" },
                                    time: { type: "STRING" },
                                    date: { type: "STRING" }
                                }
                            }
                        }
                    }
                }
            };
        }

        // Ретраи с экспоненциальной задержкой
        for (let i = 0; i < 3; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();
                if (data.candidates && data.candidates[0]) {
                    return data.candidates[0].content.parts[0].text;
                }
                throw new Error("Invalid structure");
            } catch (err) {
                if (i === 2) throw err;
                await new Promise(r => setTimeout(r, 1000 * (i + 1)));
            }
        }
    }

    async function loadAI(topic, btn) {
        currentTopic = topic;
        const feed = document.getElementById('feed');
        
        if (btn) {
            document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('searchInput').value = '';
        }

        feed.innerHTML = `
            <div class="loader">
                <div class="spin"></div>
                <p style="font-weight:bold; color:#fff; letter-spacing:1px;">СКАНИРУЮ РЕАЛЬНОСТЬ... 📡</p>
                <p style="font-size:12px; margin-top:8px; opacity:0.7">Нейросеть агрегирует поток данных</p>
            </div>`;

        try {
            const responseText = await callGemini(`Найди 5 самых свежих и реальных новостей на тему: "${topic}".`, true);
            const parsed = JSON.parse(responseText);
            const news = parsed.items || [];

            if (news.length === 0) throw new Error("Empty news list");

            feed.innerHTML = '';
            news.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-tag">${item.tag || 'LIVE'}</span>
                        <span class="card-time">
                            <i class="fa-regular fa-calendar-check" style="font-size:10px"></i> ${item.date || ''}<br>
                            <i class="fa-regular fa-clock" style="font-size:10px"></i> ${item.time || ''}
                        </span>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <button class="card-btn" onclick="readMore('${item.title.replace(/'/g, "\\'")}')">
                        <i class="fa-solid fa-brain"></i> АНАЛИЗ ИИ
                    </button>
                `;
                feed.appendChild(card);
            });
        } catch (e) {
            feed.innerHTML = `
                <div class="error-card">
                    <i class="fa-solid fa-satellite-dish" style="font-size:45px; color:var(--error); opacity:0.8"></i>
                    <h3 style="color:#fff; margin:20px 0 10px">Сигнал потерян</h3>
                    <p style="font-size:14px; opacity:0.8">Нейросеть временно недоступна. Попробуй обновить категорию или воспользуйся поиском.</p>
                    <button class="retry-btn" onclick="loadAI(currentTopic)">ПОВТОРИТЬ СКАН</button>
                </div>`;
        }
    }

    async function readMore(title) {
        const r = document.getElementById('reader');
        const c = document.getElementById('r-content');
        r.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        c.innerHTML = '<div class="loader"><div class="spin"></div><p>Дешифровка данных... 🧠</p></div>';

        try {
            const article = await callGemini(`Напиши подробную, профессиональную новостную статью на русском языке по теме: "${title}". Разбей на смысловые блоки, используй жирный шрифт для важных моментов и добавь эмодзи.`);
            c.innerHTML = `<h2>${title}</h2><div style="height:1px; background:#30363d; margin-bottom:25px;"></div>` + 
                          article.split('\n').map(p => p.trim() ? `<p style="margin-bottom:18px">${p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>` : '').join('');
        } catch (e) {
            c.innerHTML = '<div class="error-card"><p>Ошибка загрузки анализа.</p></div>';
        }
    }

    function handleSearch(e) {
        e.preventDefault();
        const val = document.getElementById('searchInput').value.trim();
        if (val) loadAI(`самые свежие новости по запросу: ${val}`);
    }

    function closeR() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = () => loadAI('главные мировые новости за текущий час', document.getElementById('btn-main'));
</script>

</body>
</html>
