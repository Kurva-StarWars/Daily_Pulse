<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Pulse | Информационный поток</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg: #000000; 
            --surface: #0a0a0a; 
            --accent: #ffffff;
            --secondary: #71717a;
            --border: #18181b;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: var(--font-main);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- Header & Layout --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding-top: env(safe-area-inset-top);
        }

        .container { max-width: 600px; margin: 0 auto; width: 100%; }

        .top-nav { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        
        .status-pill { 
            font-size: 9px; font-weight: 700; color: #fff; 
            background: #18181b; padding: 4px 10px; border-radius: 4px;
            display: flex; align-items: center; gap: 6px; border: 1px solid var(--border);
        }
        .status-pill span { width: 4px; height: 4px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }

        .search-box { padding: 0 16px 12px; }
        .search-bar {
            display: flex; background: #0f0f0f; border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px; align-items: center; gap: 10px;
        }
        .search-bar i { color: var(--secondary); font-size: 14px; }
        .search-bar input { background: transparent; border: none; color: #fff; flex: 1; font-size: 14px; outline: none; }

        .nav-scroller { 
            display: flex; gap: 16px; overflow-x: auto; padding: 0 16px 12px; 
            scrollbar-width: none;
        }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .nav-scroller button {
            background: transparent; color: var(--secondary); border: none;
            padding: 4px 0; font-weight: 600; font-size: 12px;
            white-space: nowrap; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-scroller button.active { color: #fff; border-bottom: 2px solid #fff; }

        /* --- News Feed --- */
        main { max-width: 600px; margin: 0 auto; padding: 20px 16px 120px; }
        #feed { display: flex; flex-direction: column; }

        .news-card {
            padding: 24px 0; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: transform 0.1s;
        }
        .news-card:active { transform: scale(0.99); opacity: 0.8; }
        .news-card:last-child { border-bottom: none; }

        .meta-row { display: flex; gap: 12px; font-size: 10px; font-weight: 700; color: var(--secondary); margin-bottom: 10px; text-transform: uppercase; }
        .tag-pill { color: #fff; border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; }
        
        .news-title { font-size: 1.25rem; font-weight: 700; line-height: 1.3; color: #fff; margin-bottom: 10px; }
        .news-desc { font-size: 14px; color: var(--secondary); margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- Loading states --- */
        .loader { text-align: center; padding: 40px 0; }
        .dot-spin {
            width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Full Reader --- */
        #reader {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: none; flex-direction: column;
        }
        .reader-header {
            padding: 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            padding-top: env(safe-area-inset-top);
        }
        .reader-body { flex: 1; overflow-y: auto; padding: 32px 20px; max-width: 650px; margin: 0 auto; }
        .reader-body h1 { font-size: 1.8rem; font-weight: 800; line-height: 1.2; margin-bottom: 24px; color: #fff; }
        .reader-body p { font-size: 1rem; color: #a1a1aa; margin-bottom: 20px; line-height: 1.6; }

        .footer-load { padding: 40px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="top-nav">
            <div class="brand">Daily Pulse</div>
            <div class="status-pill"><span></span> LIVE STREAM</div>
        </div>
        
        <div class="search-box">
            <form onsubmit="handleGlobalSearch(event)">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="mainSearch" placeholder="Поиск по архивам и событиям...">
                </div>
            </form>
        </div>

        <nav class="nav-scroller">
            <button id="cat-all" class="active" onclick="switchCategory('последние мировые новости сегодня от новых к старым', this)">Лента</button>
            <button onclick="switchCategory('новости технологий и нейросетей за последние 24 часа', this)">Техно</button>
            <button onclick="switchCategory('бизнес и мировые рынки новости сегодня', this)">Бизнес</button>
            <button onclick="switchCategory('новости мировой политики сегодня', this)">Политика</button>
            <button onclick="switchCategory('новости культуры и медиа', this)">Культура</button>
        </nav>
    </div>
</header>

<main>
    <div id="feed"></div>
    <div id="scrollAnchor" class="footer-load">
        <div class="dot-spin"></div>
        <p style="font-size: 10px; color: var(--secondary); margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;">Загрузка потока...</p>
    </div>
</main>

<div id="reader">
    <div class="reader-header">
        <i class="fa-solid fa-arrow-left" onclick="closeReader()" style="font-size: 20px; cursor: pointer;"></i>
        <div class="brand" style="font-size: 0.8rem;">Daily Pulse</div>
        <div style="width: 20px;"></div>
    </div>
    <div id="readerBody" class="reader-body"></div>
</div>

<script>
    const apiKey = "";
    let currentTopic = 'последние мировые новости сегодня от новых к старым';
    let isFetching = false;
    let page = 1;

    async function fetchGemini(prompt, search = true) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const body = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: "Вы — профессиональное СМИ. Ваша задача: генерировать только список новостей без лишних вступлений. Строгий формат, от новых к старым." }] },
            generationConfig: { temperature: 0.4, maxOutputTokens: 2000 }
        };
        if (search) body.tools = [{ "google_search": {} }];

        for (let i = 0; i < 5; i++) {
            try {
                const res = await fetch(url, { method: 'POST', body: JSON.stringify(body) });
                if (!res.ok) throw new Error("Retry");
                const d = await res.json();
                return d.candidates[0].content.parts[0].text;
            } catch (e) {
                if (i === 4) throw e;
                await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
            }
        }
    }

    async function loadFeed(isAppend = false) {
        if (isFetching) return;
        isFetching = true;
        
        const feed = document.getElementById('feed');
        if (!isAppend) {
            feed.innerHTML = '';
            page = 1;
        }

        const prompt = `Найди 15 новостей по теме: "${currentTopic}". 
        Важно: если это не первая загрузка, ищи новости, которые были чуть раньше предыдущих, чтобы создать непрерывную ленту.
        Формат строго:
        %%%
        T: [Заголовок]
        C: [Категория]
        D: [Время публикации]
        S: [Суть в одну строку]
        %%%
        ---`;

        try {
            const raw = await fetchGemini(prompt);
            const blocks = raw.split('%%%').filter(b => b.includes('T:'));

            blocks.forEach(b => {
                const title = b.match(/T: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "Заголовок";
                const cat = b.match(/C: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "Мир";
                const date = b.match(/D: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "Сейчас";
                const desc = b.match(/S: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || "";

                const card = document.createElement('div');
                card.className = 'news-card';
                card.onclick = () => openFull(title);
                card.innerHTML = `
                    <div class="meta-row">
                        <span class="tag-pill">${cat}</span>
                        <span>${date}</span>
                    </div>
                    <h2 class="news-title">${title}</h2>
                    <p class="news-desc">${desc}</p>
                `;
                feed.appendChild(card);
            });
            page++;
        } catch (e) {
            if (!isAppend) feed.innerHTML = '<p style="text-align:center; padding:50px; color:gray;">Ошибка подключения к ленте событий.</p>';
        } finally {
            isFetching = false;
        }
    }

    async function openFull(title) {
        const r = document.getElementById('reader');
        const b = document.getElementById('readerBody');
        r.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        b.innerHTML = '<div class="loader"><div class="dot-spin"></div><p style="margin-top:20px; font-size:12px; color:gray;">Генерация полного отчета...</p></div>';

        try {
            const res = await fetchGemini(`Напиши профессиональную статью на тему: "${title}". Без вступлений, только суть, факты и контекст.`, false);
            b.innerHTML = `<h1>${title}</h1>` + 
                          res.split('\n').map(p => p.trim() ? `<p>${p.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</p>` : '').join('');
        } catch (e) {
            b.innerHTML = '<p>Не удалось загрузить содержание статьи.</p>';
        }
    }

    function switchCategory(topic, btn) {
        currentTopic = topic;
        document.querySelectorAll('.nav-scroller button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mainSearch').value = '';
        window.scrollTo(0, 0);
        loadFeed();
    }

    function handleGlobalSearch(e) {
        e.preventDefault();
        const v = document.getElementById('mainSearch').value.trim();
        if (v) {
            currentTopic = v + ' последние новости';
            document.querySelectorAll('.nav-scroller button').forEach(b => b.classList.remove('active'));
            loadFeed();
        }
    }

    function closeReader() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Infinite Scroll Logic
    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
            loadFeed(true);
        }
    };

    window.onload = () => loadFeed();
</script>

</body>
</html>
