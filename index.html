<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Pulse | Trinity</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg: #050505; 
            --card: #0d1117; 
            --accent: #58a6ff; 
            --fox: #ff7b72;
            --text: #e6edf3; 
            --header: rgba(22, 27, 34, 0.8); 
            --border: #30363d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #161b22, transparent);
            background-attachment: fixed;
        }
        
        header { 
            background: var(--header); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid var(--border); padding-top: env(safe-area-inset-top); 
        }
        .logo-box { display: flex; flex-direction: column; align-items: center; padding: 10px 0; }
        .logo-txt { font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-transform: uppercase; margin: 0; }
        .engine-tag { font-size: 9px; color: var(--accent); font-weight: 800; letter-spacing: 1px; margin-top: 2px; }

        .search-container { padding: 0 15px 10px; }
        .search-wrapper { 
            display: flex; background: rgba(0,0,0,0.5); border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px 15px; align-items: center; gap: 10px;
        }
        .search-wrapper input { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; }

        .nav-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 5px 15px 12px; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tabs button { 
            background: #21262d; color: #8b949e; border: 1px solid var(--border); 
            padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 12px; 
            white-space: nowrap; transition: 0.2s; cursor: pointer;
        }
        .nav-tabs button.active { background: var(--accent); color: #000; border-color: var(--accent); }

        main { max-width: 600px; margin: 0 auto; padding: 10px 15px 100px; }
        #feed { display: flex; flex-direction: column; gap: 12px; }
        
        .news-item { 
            background: var(--card); border: 1px solid var(--border); border-radius: 18px; 
            padding: 20px; animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .news-item::after {
            content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px;
            background: linear-gradient(135deg, transparent 50%, rgba(88,166,255,0.05) 50%);
        }

        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .tag { font-size: 10px; font-weight: 900; color: var(--accent); background: rgba(88,166,255,0.1); padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .date { font-size: 10px; color: #8b949e; font-weight: 600; }
        .title-text { font-size: 1.2rem; font-weight: 800; color: #fff; line-height: 1.4; margin-bottom: 15px; }
        
        .action-btn { 
            background: linear-gradient(135deg, #238636, #2ea043); color: #fff; border: none; 
            padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 13px; box-shadow: 0 4px 12px rgba(35, 134, 54, 0.2);
        }
        .action-btn:active { transform: scale(0.98); opacity: 0.9; }

        .loading-vibe { text-align: center; padding: 80px 20px; }
        .trinity-loader { 
            width: 60px; height: 60px; border: 3px solid rgba(88,166,255,0.1); 
            border-top: 3px solid var(--accent); border-right: 3px solid var(--fox); border-radius: 50%; 
            animation: rotate 1s cubic-bezier(0.5, 0, 0.5, 1) infinite; margin: 0 auto 20px;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }

        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: none; flex-direction: column; }
        .over-head { padding: 15px 20px; background: var(--header); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top); }
        .over-content { flex: 1; overflow-y: auto; padding: 25px; line-height: 1.8; color: #d1d9e0; }
        
        .error-card { background: rgba(255, 123, 114, 0.05); border: 1px dashed var(--fox); padding: 40px 20px; border-radius: 20px; text-align: center; }
        .retry-btn { background: var(--fox); color: #fff; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 800; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1 class="logo-txt">Daily Pulse</h1>
        <div class="engine-tag">TRINITY: DOXY • FOXY • GEMINI</div>
    </div>
    
    <div class="search-container">
        <form onsubmit="handleSearch(event)">
            <div class="search-wrapper">
                <i class="fa-solid fa-satellite-dish" style="color:var(--accent)"></i>
                <input type="text" id="searchInput" placeholder="Сканировать реальность...">
            </div>
        </form>
    </div>

    <nav class="nav-tabs">
        <button id="tab-main" class="active" onclick="initScan('самые главные мировые новости последнего часа', this)">ГЛАВНОЕ 🔥</button>
        <button onclick="initScan('новости видеоигр, консолей и индустрии', this)">ИГРЫ 🎮</button>
        <button onclick="initScan('новости технологий, AI и гаджетов', this)">ТЕХНО ⚡️</button>
        <button onclick="initScan('научные открытия, космос и медицина', this)">НАУКА 🧬</button>
        <button onclick="initScan('новости киберспорта и турниров', this)">ESPORTS 🏆</button>
    </nav>
</header>

<main>
    <div id="feed"></div>
</main>

<div id="overlay">
    <div class="over-head">
        <span style="font-weight: 900; font-size: 11px; color: var(--accent); letter-spacing: 1.5px;">NEURAL DECODING...</span>
        <i class="fa-solid fa-xmark" onclick="closeOverlay()" style="font-size: 28px; cursor: pointer;"></i>
    </div>
    <div id="overBody" class="over-content"></div>
</div>

<script>
    const apiKey = "";
    let lastQuery = 'самые главные мировые новости последнего часа';

    async function trinityRequest(userPrompt, useSearch = true) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{ parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: "Ты — агрегатор новостей Trinity. Твоя задача: выдавать только актуальные, реальные новости. Используй поиск, чтобы проверить факты." }] }
        };

        if (useSearch) {
            payload.tools = [{ "google_search": {} }];
        }

        // Exponential Backoff implementation
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("API Error");
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) {
                if (i === 4) throw err;
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }
    }

    async function initScan(topic, btn) {
        lastQuery = topic;
        const feed = document.getElementById('feed');
        if (btn) {
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        feed.innerHTML = `
            <div class="loading-vibe">
                <div class="trinity-loader"></div>
                <p style="font-weight: 900; color: #fff; letter-spacing: 1px;">ТРОЙНОЙ СКАН... 📡</p>
                <p style="font-size: 12px; opacity: 0.6; margin-top: 10px;">Doxy, Foxy и Gemini на связи</p>
            </div>`;

        const prompt = `Найди 5 самых свежих и горячих новостей на тему: "${topic}". 
        Для каждой новости выведи данные строго в таком формате:
        НОВОСТЬ: [Заголовок]
        ТЕГ: [Краткий тег]
        ВРЕМЯ: [Дата и время]
        --- (разделитель новостей)`;

        try {
            const raw = await trinityRequest(prompt);
            const rawItems = raw.split('---').filter(t => t.includes('НОВОСТЬ:'));
            
            if (rawItems.length === 0) throw new Error("Parse Fail");

            feed.innerHTML = '';
            rawItems.forEach(block => {
                const title = block.match(/НОВОСТЬ: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || 'Без заголовка';
                const tag = block.match(/ТЕГ: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || 'LIVE';
                const time = block.match(/ВРЕМЯ: (.*)/)?.[1]?.replace(/[\[\]]/g, '') || 'Только что';

                const card = document.createElement('div');
                card.className = 'news-item';
                card.innerHTML = `
                    <div class="meta-row">
                        <span class="tag">${tag}</span>
                        <span class="date">${time}</span>
                    </div>
                    <div class="title-text">${title}</div>
                    <button class="action-btn" onclick="deepDive('${title.replace(/'/g, "\\'")}')">
                        <i class="fa-solid fa-microchip"></i> ПОЛНЫЙ АНАЛИЗ
                    </button>
                `;
                feed.appendChild(card);
            });
        } catch (e) {
            feed.innerHTML = `
                <div class="error-card">
                    <i class="fa-solid fa-triangle-exclamation" style="font-size:40px; color:var(--fox); margin-bottom:20px"></i>
                    <h3 style="color:#fff">Критический сбой связи</h3>
                    <p style="font-size:13px; opacity:0.8">Нейросеть отклонила запрос или сервер перегружен. Мы уже перенаправляем трафик.</p>
                    <button class="retry-btn" onclick="initScan(lastQuery)">ПЕРЕЗАГРУЗИТЬ КАНАЛ</button>
                </div>`;
        }
    }

    async function deepDive(title) {
        const o = document.getElementById('overlay');
        const b = document.getElementById('overBody');
        o.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        b.innerHTML = '<div class="loading-vibe"><div class="trinity-loader"></div><p>Декодирую инфо-поток... 🗝️</p></div>';

        try {
            const result = await trinityRequest(`Напиши подробную, профессиональную статью про: "${title}". Используй актуальные данные из поиска, разбей на абзацы, добавь аналитику и эмодзи.`);
            b.innerHTML = `<h2 style="color:#fff; font-weight:900; line-height:1.3; margin-bottom:25px;">${title}</h2>` + 
                          result.split('\n').map(p => p.trim() ? `<p style="margin-bottom:20px">${p.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</p>` : '').join('');
        } catch (e) {
            b.innerHTML = '<div class="error-card"><p>Не удалось расшифровать данные.</p></div>';
        }
    }

    function handleSearch(e) {
        e.preventDefault();
        const v = document.getElementById('searchInput').value.trim();
        if (v) {
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            initScan(v);
        }
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = () => initScan('самые главные мировые новости последнего часа');
</script>

</body>
</html>
