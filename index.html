<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Pulse | Fox Final</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg: #010409; 
            --card: #0d1117; 
            --accent: #ff7b72; 
            --blue: #58a6ff;
            --text: #c9d1d9; 
            --header: #161b22; 
            --success: #238636; 
            --border: #30363d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }
        
        header { 
            background: var(--header); position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid var(--border); padding-top: env(safe-area-inset-top); 
        }
        .logo-box { display: flex; flex-direction: column; align-items: center; padding: 12px 0 8px; }
        .logo-txt { font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
        
        .search-area { padding: 0 15px 12px; }
        .search-bar { 
            display: flex; background: #010409; border: 1px solid var(--border); 
            border-radius: 12px; padding: 10px 15px; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .search-bar:focus-within { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(88,166,255,0.1); }
        .search-bar input { 
            background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; 
        }

        .nav-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 5px 15px 12px; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-scroll button { 
            background: #21262d; color: #fff; border: 1px solid var(--border); 
            padding: 8px 18px; border-radius: 20px; font-weight: 700; font-size: 12px; 
            white-space: nowrap; transition: 0.2s; cursor: pointer;
        }
        .nav-scroll button.active { background: var(--blue); border-color: var(--blue); color: #000; }

        main { max-width: 600px; margin: 10px auto; padding: 0 15px 100px; }
        #feed { display: flex; flex-direction: column; gap: 12px; }
        
        .news-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
            padding: 18px; animation: slideUp 0.4s ease-out; position: relative;
            overflow: hidden; transition: transform 0.2s;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .news-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--blue); }

        .meta { display: flex; justify-content: space-between; font-size: 10px; color: #8b949e; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; }
        .title { font-size: 1.15rem; font-weight: 700; color: #f0f6fc; line-height: 1.4; margin-bottom: 18px; }
        
        .read-btn { 
            background: #21262d; color: var(--blue); border: 1px solid var(--border); 
            padding: 12px; border-radius: 10px; width: 100%; font-weight: 800; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 13px;
        }
        .read-btn:active { background: #30363d; transform: scale(0.98); }

        .loading-state { text-align: center; padding: 60px 20px; }
        .fox-spinner { 
            width: 45px; height: 45px; border: 4px solid rgba(88,166,255,0.1); 
            border-top: 4px solid var(--blue); border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #reader { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
        .reader-header { padding: 15px 20px; background: var(--header); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top); }
        .reader-content { flex: 1; overflow-y: auto; padding: 30px 25px; line-height: 1.7; font-size: 1.1rem; }
        
        .error-box { background: rgba(248, 81, 73, 0.05); border: 1px dashed var(--accent); padding: 30px; border-radius: 16px; text-align: center; }
        .btn-retry { background: var(--blue); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <span class="logo-txt">Daily Pulse</span>
        <div style="font-size: 10px; color: var(--blue); font-weight: 900; margin-top: 4px;">FOX ENGINE STABLE 🦊</div>
    </div>
    
    <div class="search-area">
        <form onsubmit="handleSearch(event)">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color:var(--blue)"></i>
                <input type="text" id="searchInput" placeholder="Поиск в реальности...">
            </div>
        </form>
    </div>

    <nav class="nav-scroll">
        <button id="btn-default" class="active" onclick="fetchNews('главные мировые новости за текущий час', this)">ГЛАВНОЕ 🔥</button>
        <button onclick="fetchNews('новости видеоигр и геймдева сегодня', this)">ИГРЫ 🎮</button>
        <button onclick="fetchNews('новости технологий и искусственного интеллекта', this)">ТЕХНО ⚡️</button>
        <button onclick="fetchNews('научные открытия и новости космоса', this)">НАУКА 🧬</button>
        <button onclick="fetchNews('новости кино и индустрии развлечений', this)">КИНО 🍿</button>
    </nav>
</header>

<main>
    <div id="feed"></div>
</main>

<div id="reader">
    <div class="reader-header">
        <span style="font-weight: 900; font-size: 12px; color: var(--blue); letter-spacing: 1px;">PULSE ANALYSIS</span>
        <i class="fa-solid fa-xmark" onclick="closeReader()" style="font-size: 28px; cursor: pointer;"></i>
    </div>
    <div id="readerBody" class="reader-content"></div>
</div>

<script>
    const apiKey = "";
    let lastTopic = 'главные мировые новости за текущий час';

    async function aiRequest(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        for (let i = 0; i < 3; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    return data.candidates[0].content.parts[0].text;
                }
                throw new Error("No data");
            } catch (err) {
                if (i === 2) throw err;
                await new Promise(r => setTimeout(r, 1000 * (i + 1)));
            }
        }
    }

    async function fetchNews(topic, btn) {
        lastTopic = topic;
        const feed = document.getElementById('feed');
        if (btn) {
            document.querySelectorAll('.nav-scroll button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('searchInput').value = '';
        }

        feed.innerHTML = `
            <div class="loading-state">
                <div class="fox-spinner"></div>
                <p style="font-weight: 800; color: #fff;">СКАНИРУЮ РЕАЛЬНОСТЬ... 📡</p>
                <p style="font-size: 12px; opacity: 0.6; margin-top: 8px;">Fox Engine пробивает поток</p>
            </div>`;

        const prompt = `Найди 5 РЕАЛЬНЫХ свежих новостей на тему: "${topic}". 
        Формат вывода: [Заголовок] | [Тег] | [Дата и Время]
        Разделяй новости символами "===". Только новости, без вступлений.`;

        try {
            const raw = await aiRequest(prompt);
            const items = raw.split('===').filter(t => t.includes('|'));
            
            if (items.length === 0) throw new Error("Parse Error");

            feed.innerHTML = '';
            items.forEach(text => {
                const [title, tag, time] = text.split('|').map(s => s.trim().replace(/^\[|\]$/g, ''));
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="meta">
                        <span>${tag || 'LIVE'}</span>
                        <span>${time || 'Сегодня'}</span>
                    </div>
                    <div class="title">${title}</div>
                    <button class="read-btn" onclick="deepAnalyze('${title.replace(/'/g, "\\'")}')">
                        <i class="fa-solid fa-brain"></i> АНАЛИЗ ИИ
                    </button>
                `;
                feed.appendChild(card);
            });
        } catch (e) {
            feed.innerHTML = `
                <div class="error-box">
                    <i class="fa-solid fa-bolt" style="font-size:40px; color:var(--blue); margin-bottom:15px"></i>
                    <h3 style="color:#fff">Ошибка сигнала</h3>
                    <p style="font-size:13px; opacity:0.8">Сервер перегружен или блокирует запрос. Попробуй сменить тему.</p>
                    <button class="btn-retry" onclick="fetchNews(lastTopic)">ПОВТОРИТЬ</button>
                </div>`;
        }
    }

    async function deepAnalyze(title) {
        const r = document.getElementById('reader');
        const b = document.getElementById('readerBody');
        r.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        b.innerHTML = '<div class="loading-state"><div class="fox-spinner"></div><p>Декодирую реальность... 🧠</p></div>';

        try {
            const text = await aiRequest(`Напиши подробный обзор новости: "${title}". Используй абзацы, эмодзи и выдели главное жирным.`);
            b.innerHTML = `<h2 style="color:#fff; margin-bottom:20px;">${title}</h2>` + 
                          text.split('\n').map(p => p.trim() ? `<p style="margin-bottom:15px">${p.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</p>` : '').join('');
        } catch (e) {
            b.innerHTML = '<p style="text-align:center; padding:50px">Ошибка расшифровки.</p>';
        }
    }

    function handleSearch(e) {
        e.preventDefault();
        const val = document.getElementById('searchInput').value.trim();
        if (val) {
            document.querySelectorAll('.nav-scroll button').forEach(b => b.classList.remove('active'));
            fetchNews(`самые последние новости по запросу: ${val}`);
        }
    }

    function closeReader() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onload = () => fetchNews('главные мировые новости за текущий час');
</script>

</body>
</html>
